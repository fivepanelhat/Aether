name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check aether/

      - name: Tests
        run: pytest tests/ -v

      - name: CLI smoke test (from outside repo root)
        shell: bash
        env:
          AETHER_SKILLS_DIR: ${{ github.workspace }}/skills
        run: |
          # Portable temp dir: $RUNNER_TEMP on GHA, /tmp or %TEMP% locally
          TMPDIR="${RUNNER_TEMP:-${TMPDIR:-/tmp}}"
          mkdir -p "$TMPDIR/aether-smoke"
          cd "$TMPDIR/aether-smoke"
          aether --version
          aether skills
