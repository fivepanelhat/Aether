name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check aether/

      - name: Tests
        run: pytest tests/ -v

      - name: CLI smoke test (from outside repo root)
        run: |
          cd /tmp
          aether --version
          AETHER_SKILLS_DIR=$GITHUB_WORKSPACE/skills aether skills
